name: Build and package

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Package
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Runtime smoke
        shell: pwsh
        run: ./tools/test-render-surfaces.ps1 -ExePath ./dist/Trayce-win-x64/Trayce.exe -OutDir ./out/render-smoke -TimeoutSeconds 12 -SkipBuild

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content Trayce.csproj
          $version = $project.Project.PropertyGroup.Version
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: ./scripts/release-notes.ps1 -Version '${{ steps.version.outputs.version }}' -OutputPath out/release-notes.md

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $asset = "dist/Trayce-win-x64.zip"
          $hashAsset = "dist/Trayce-win-x64.zip.sha256"

          function Test-ReleaseExists {
            gh release view $env:TAG *> $null
            return $LASTEXITCODE -eq 0
          }

          function Invoke-GhRetry {
            param(
              [Parameter(Mandatory = $true)][string]$Label,
              [Parameter(Mandatory = $true)][string[]]$Arguments
            )

            for ($attempt = 1; $attempt -le 3; $attempt++) {
              & gh @Arguments
              if ($LASTEXITCODE -eq 0) {
                return
              }

              if ($attempt -lt 3) {
                Write-Warning "$Label failed on attempt $attempt; retrying."
                Start-Sleep -Seconds (10 * $attempt)
              }
            }

            throw "$Label failed after 3 attempts."
          }

          if (-not (Test-ReleaseExists)) {
            $created = $false
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              gh release create $env:TAG $asset $hashAsset --target $env:GITHUB_SHA --title "Trayce $env:TAG" --notes-file out/release-notes.md --latest
              if ($LASTEXITCODE -eq 0) {
                $created = $true
                break
              }

              if (Test-ReleaseExists) {
                Write-Warning "Release $env:TAG exists after a failed create response; continuing with edit/upload."
                $created = $true
                break
              }

              if ($attempt -lt 3) {
                Write-Warning "create release failed on attempt $attempt; retrying."
                Start-Sleep -Seconds (10 * $attempt)
              }
            }

            if (-not $created) {
              throw "create release failed after 3 attempts."
            }
          }

          Invoke-GhRetry "edit release" @("release", "edit", $env:TAG, "--title", "Trayce $env:TAG", "--notes-file", "out/release-notes.md", "--latest")
          Invoke-GhRetry "upload release assets" @("release", "upload", $env:TAG, $asset, $hashAsset, "--clobber")

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Trayce-win-x64
          path: |
            dist/Trayce-win-x64.zip
            dist/Trayce-win-x64.zip.sha256
          if-no-files-found: error
